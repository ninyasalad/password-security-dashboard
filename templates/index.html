<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼安全戰情室</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="particleContainer" class="particle-bg"></div>

    <canvas id="networkCanvas" style="position: fixed; inset: 0; z-index: -1; background: #05060b;"></canvas>

    <h1>[ 密碼安全戰情室 ]</h1>

    <div class="dashboard media-card" id="mainCard">
        <label>請輸入要檢測的密碼：</label>
        <input type="password" id="pwdInput" placeholder="Password...">
        
        <div class="strength-meter">
            <div id="strengthBar" class="strength-bar"></div>
        </div>
        <div id="strengthText">強度評估：等待輸入...</div>

        <div class="chart-container">
            <canvas id="strengthChart"></canvas>
        </div>

        <label>k-匿名化數位指紋 (SHA-1)：</label>
        <div class="hash-box">
            <span id="hashPrefix" class="hash-prefix">-----</span>
            <span id="hashSuffix" class="hash-suffix">-----------------------------------</span>
        </div>
        <div class="info-text">
            🛡️ 安全機制：系統僅會傳送高亮顯示的「前 5 碼」至雲端比對，您的完整密碼絕不會離開此瀏覽器。
        </div>

        <button id="checkBtn" class="button button--primary">啟動外洩資料庫比對</button>
    </div>

    <div id="resultPanel" class="result-panel">
        <h2 id="resultTitle"></h2>
        <div id="pwnedCount" class="pwned-count" style="display: none;">0</div>
        <p id="resultDesc"></p>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}?v=3"></script>
</body>
</html>
