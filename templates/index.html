<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼安全確認</title>
    <style>
        body {
            background-color: #0a0a0f;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        h1 {
            text-shadow: 0 0 15px #00ffcc;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .dashboard {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
        }

        input[type="password"], input[type="text"] {
            width: 95%;
            padding: 15px;
            background: #000;
            border: 1px solid #00ffcc;
            color: #fff;
            font-size: 18px;
            border-radius: 5px;
            outline: none;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 密碼強度條設計 */
        .strength-meter {
            height: 10px;
            background: #222;
            border-radius: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.4s ease;
        }

        #strengthText {
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* k-匿名化指紋顯示區 */
        .hash-box {
            background: #000;
            border: 1px dashed #555;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .hash-prefix {
            color: #000;
            background-color: #00ffcc;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .hash-suffix {
            color: #555;
        }

        .info-text {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00ffcc;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }
    </style>
</head>
<body>

    <h1>[ 密碼安全確認 ]</h1>

    <div class="dashboard">
        <label>請輸入要檢測的密碼：</label>
        <input type="password" id="pwdInput" placeholder="Password...">
        
        <div class="strength-meter">
            <div id="strengthBar" class="strength-bar"></div>
        </div>
        <div id="strengthText">強度評估：等待輸入...</div>

        <div style="max-width: 300px; margin: 0 auto;">
            <canvas id="strengthChart"></canvas>
        </div>

        <label>k-匿名化數位指紋 (SHA-1)：</label>
        <div class="hash-box">
            <span id="hashPrefix" class="hash-prefix">-----</span>
            <span id="hashSuffix" class="hash-suffix">-----------------------------------</span>
        </div>
        <div class="info-text">
            🛡️ 安全機制：系統僅會傳送高亮顯示的「前 5 碼」至雲端比對，您的完整密碼絕不會離開此瀏覽器。
        </div>

        <button id="checkBtn">啟動外洩資料庫比對</button>

        <div id="resultPanel" class="result-panel">
            <h2 id="resultTitle"></h2>
            <div id="pwnedCount" class="pwned-count" style="display: none;">0</div>
            <p id="resultDesc"></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
